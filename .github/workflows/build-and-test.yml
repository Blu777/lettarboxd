name: Build and Test

on:
  workflow_call:

# Opt JS actions into Node.js 24 explicitly. Needed while some
# third-party actions (e.g. romeovs/lcov-reporter-action) have not
# published an update that targets Node 24 on their own.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build TypeScript
        run: yarn build

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run TypeScript type check
        run: yarn tsc --noEmit

      - name: Run unit tests with coverage
        # Integration tests (*.itest.ts) hit the live Letterboxd site
        # and are blocked (403) from GitHub Actions IPs, so exclude them
        # from CI. Run them locally via `yarn test:integration`.
        run: yarn jest --coverage --testPathIgnorePatterns=itest
        env:
          CI: true

      - name: Check coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Error: coverage-summary.json not found"
            exit 1
          fi

          # Extract coverage percentages
          STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
          BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
          LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)

          echo "Coverage Results:"
          echo "  Statements: $STATEMENTS%"
          echo "  Branches: $BRANCHES%"
          echo "  Functions: $FUNCTIONS%"
          echo "  Lines: $LINES%"
          echo ""
          echo "Required Threshold: 85% for all metrics"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true